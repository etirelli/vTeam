apiVersion: v1
kind: ConfigMap
metadata:
  name: operator-config
  labels:
    app: agentic-operator
    deployment-type: e2e
data:
  # Use local operator image loaded into kind cluster (for scheduled session triggers)
  OPERATOR_IMAGE: "localhost/vteam_operator:latest"
  IMAGE_PULL_POLICY: "IfNotPresent"
  # Use local runner image loaded into kind cluster (not quay.io)
  AMBIENT_CODE_RUNNER_IMAGE: "vteam_claude_runner:latest"
  # Vertex AI keys are intentionally omitted here.
  # They are set by: ./scripts/setup-vertex-kind.sh (called via LOCAL_VERTEX=true)
  # Omitting them prevents kind-rebuild from clobbering a live Vertex config.
